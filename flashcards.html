<body>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function getTodayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const RATINGS = [
      { value: 1, label: "Blank", color: "#e94560" },
      { value: 2, label: "Hard",  color: "#f4a261" },
      { value: 3, label: "Good",  color: "#52b788" },
      { value: 4, label: "Easy",  color: "#48cae4" },
    ];

    const words = [
      { word: "Sophistry", pronunciation: "SOF-is-tree", definition: "Clever but flawed reasoning designed to deceive", example: "The pundit's sophistry sounded persuasive on air, but collapsed under the first serious question.", category: "Arguments & Reasoning" },
      { word: "Syllogism", pronunciation: "SIL-uh-jiz-um", definition: "A logical argument where a conclusion follows from two premises", example: "All men are mortal, Socrates is a man — the syllogism concludes he must be mortal.", category: "Arguments & Reasoning" },
      { word: "Tautology", pronunciation: "taw-TOL-uh-jee", definition: "Saying the same thing twice in different words; needlessly circular", example: "Saying 'a bachelor is an unmarried man' is a tautology — the definition is already baked into the word.", category: "Arguments & Reasoning" },
      { word: "Axiom", pronunciation: "AK-see-um", definition: "A self-evident truth taken as a starting point", example: "That markets respond to incentives is treated as an axiom in most economic models.", category: "Arguments & Reasoning" },
      { word: "Non Sequitur", pronunciation: "non SEK-wi-ter", definition: "A conclusion that doesn't follow from the evidence", example: "She argued we should cut the budget, then concluded — in a total non sequitur — that morale would improve.", category: "Arguments & Reasoning" },
      { word: "Specious", pronunciation: "SPEE-shus", definition: "Looks valid on the surface, but isn't", example: "The lawyer's specious reasoning convinced the jury but fooled no one who read the transcript carefully.", category: "Ideas & Claims" },
      { word: "Reductive", pronunciation: "rih-DUK-tiv", definition: "Oversimplifying something complex", example: "Calling the conflict 'just about oil' is reductive — it flattens decades of political and cultural tension.", category: "Ideas & Claims" },
      { word: "Germane", pronunciation: "jer-MAYN", definition: "Relevant and appropriate to the topic", example: "Only evidence germane to the charge was allowed; the judge excluded everything else.", category: "Ideas & Claims" },
      { word: "Apocryphal", pronunciation: "uh-POK-ruh-ful", definition: "Of doubtful authenticity; probably not true", example: "The story of Washington chopping down the cherry tree is almost certainly apocryphal.", category: "Ideas & Claims" },
      { word: "Cogent", pronunciation: "KOH-jent", definition: "Clear, logical, and convincing", example: "She made a cogent case for restructuring the team, and leadership approved it on the spot.", category: "Ideas & Claims" },
      { word: "Tendentious", pronunciation: "ten-DEN-shus", definition: "Slanted toward a particular viewpoint", example: "The documentary was tendentious — every interview and edit pushed the same predetermined conclusion.", category: "Bias & Perspective" },
      { word: "Solipsistic", pronunciation: "sol-ip-SIS-tik", definition: "Unable to consider any perspective beyond one's own", example: "His analysis was solipsistic; he never considered how the policy might look to someone outside his experience.", category: "Bias & Perspective" },
      { word: "Parochial", pronunciation: "puh-ROH-kee-ul", definition: "Narrow in scope; limited to a local or small-minded view", example: "The board's parochial focus on local donors meant they missed a major national grant opportunity.", category: "Bias & Perspective" },
      { word: "Epistemic", pronunciation: "ep-ih-STEE-mik", definition: "Relating to knowledge or the degree of its validation", example: "The disagreement wasn't about values — it was epistemic: they couldn't agree on what counted as evidence.", category: "Bias & Perspective" },
      { word: "Equivocal", pronunciation: "ih-KWIV-uh-kul", definition: "Open to multiple interpretations; ambiguous", example: "The CEO's statement was deliberately equivocal, giving investors no clear signal either way.", category: "Nuance & Complexity" },
      { word: "Heterodox", pronunciation: "HET-er-uh-doks", definition: "Contrary to established or accepted beliefs", example: "Her heterodox view — that less sleep improves some kinds of creativity — ran counter to every study in the field.", category: "Nuance & Complexity" },
      { word: "Dialectical", pronunciation: "dy-uh-LEK-tih-kul", definition: "Relating to the tension between opposing forces or ideas", example: "The report captured the dialectical tension between efficiency and equity that runs through every policy debate.", category: "Nuance & Complexity" },
      { word: "Liminal", pronunciation: "LIM-ih-nul", definition: "In between two states; on the threshold of something", example: "The months between graduation and the first job are a liminal period — no longer a student, not yet a professional.", category: "Nuance & Complexity" },
      { word: "Ad Hominem", pronunciation: "ad HOM-ih-nem", definition: "Attacking the person making an argument rather than the argument itself", example: "Rather than address the data, he went ad hominem and questioned her credentials instead.", category: "Arguments & Reasoning" },
      { word: "Confirmation Bias", pronunciation: "kon-fer-MAY-shun BY-us", definition: "The tendency to favor information that confirms one's existing beliefs", example: "His confirmation bias was obvious — he trusted every study that agreed with him and dismissed every one that didn't.", category: "Bias & Perspective" },
      { word: "Ambivalent", pronunciation: "am-BIV-uh-lent", definition: "Having simultaneous conflicting feelings or attitudes about something", example: "She was ambivalent about the promotion — excited by the title, dreading the travel.", category: "Nuance & Complexity" },
      { word: "Exegesis", pronunciation: "ek-suh-JEE-sis", definition: "Critical interpretation and explanation of a text or idea", example: "The professor's exegesis of the founding documents ran three lectures and still felt incomplete.", category: "Critical Thinking" },
      { word: "Euphemism", pronunciation: "YOO-fuh-miz-um", definition: "A mild or indirect word used in place of something blunt or unpleasant", example: "Calling layoffs a 'workforce realignment' is a euphemism that does nothing to soften the blow for those affected.", category: "Language & Rhetoric" },
      { word: "Strawman", pronunciation: "STRAW-man", definition: "Misrepresenting someone's argument to make it easier to attack", example: "He built a strawman by pretending she wanted to abolish all regulation, then demolished that position instead.", category: "Arguments & Reasoning" },
      { word: "Paradigm", pronunciation: "PAIR-uh-dym", definition: "A typical pattern, model, or dominant framework of thought", example: "The internet didn't just change communication — it shifted the entire paradigm of how information is valued.", category: "Ideas & Claims" },
      { word: "Motivated Reasoning", pronunciation: "MOH-tih-vay-ted REE-zun-ing", definition: "Reasoning toward a desired conclusion rather than toward truth", example: "His motivated reasoning was transparent: he worked backward from the answer he wanted and cherry-picked the evidence.", category: "Bias & Perspective" },
      { word: "Counterfactual", pronunciation: "kown-ter-FAK-choo-ul", definition: "Relating to what would have happened under different conditions", example: "The interesting counterfactual is what happens if the vaccine had arrived six months earlier.", category: "Critical Thinking" },
      { word: "Laconic", pronunciation: "luh-KON-ik", definition: "Using very few words; brief and to the point", example: "His email reply was characteristically laconic: just 'No. Try again.'", category: "Language & Rhetoric" },
      { word: "Inductive", pronunciation: "in-DUK-tiv", definition: "Reasoning from specific observations to a general conclusion", example: "From thousands of patient records, the researchers used inductive reasoning to identify a new risk pattern.", category: "Arguments & Reasoning" },
      { word: "Salient", pronunciation: "SAY-lee-ent", definition: "Most noticeable, relevant, or important among a set of things", example: "The most salient finding wasn't the one the authors highlighted — it was buried in the appendix.", category: "Ideas & Claims" },
      { word: "Cognitive Dissonance", pronunciation: "KOG-nih-tiv DIS-uh-nents", definition: "The discomfort of holding two conflicting beliefs simultaneously", example: "She experienced cognitive dissonance voting for a policy she privately believed was wrong.", category: "Bias & Perspective" },
      { word: "Inchoate", pronunciation: "in-KOH-it", definition: "Just begun; not yet fully formed or clearly articulated", example: "The startup had an inchoate vision — big ambitions, but no coherent strategy for getting there.", category: "Nuance & Complexity" },
      { word: "Hermeneutics", pronunciation: "her-muh-NOO-tiks", definition: "The theory and methodology of interpretation, especially of texts", example: "Legal hermeneutics explains why two judges can read the same law and reach opposite conclusions.", category: "Critical Thinking" },
      { word: "Abductive", pronunciation: "ab-DUK-tiv", definition: "Inferring the most likely explanation from incomplete evidence", example: "The detective's abductive reasoning led her to the most plausible suspect, even without direct evidence.", category: "Arguments & Reasoning" },
      { word: "Verisimilitude", pronunciation: "ver-ih-sih-MIL-ih-tood", definition: "The appearance of being true or real, even if not actually so", example: "The novel's power came from its verisimilitude — the dialogue felt like conversations you'd actually overheard.", category: "Ideas & Claims" },
      { word: "Halo Effect", pronunciation: "HAY-loh ih-FEKT", definition: "Letting one positive trait color the overall perception of a person or idea", example: "The halo effect was at work: because the launch went well, leadership assumed everything else the team did was equally sound.", category: "Bias & Perspective" },
      { word: "Provisional", pronunciation: "pruh-VIZ-hun-ul", definition: "Temporary or preliminary; subject to revision as new information arrives", example: "The findings are provisional — treat them as a starting point, not a settled conclusion.", category: "Nuance & Complexity" },
      { word: "Apophenia", pronunciation: "ap-oh-FEE-nee-uh", definition: "Perceiving meaningful patterns or connections in random, unrelated data", example: "Conspiracy theories often begin with apophenia: seeing a sinister pattern in events that are simply coincidental.", category: "Critical Thinking" },
      { word: "Deductive", pronunciation: "dih-DUK-tiv", definition: "Reasoning from general premises to a specific, necessary conclusion", example: "From the rule that all contracts require consideration, he used deductive reasoning to conclude the agreement was void.", category: "Arguments & Reasoning" },
      { word: "Ethnocentrism", pronunciation: "eth-noh-SEN-triz-um", definition: "Judging other cultures by the standards and values of one's own", example: "The anthropologist warned against ethnocentrism: judging another society's rituals by the standards of your own.", category: "Bias & Perspective" },
      { word: "Contingent", pronunciation: "kun-TIN-jent", definition: "Dependent on circumstances; possible but not inevitable", example: "Success here is contingent on the regulatory environment, which could change with the next election.", category: "Nuance & Complexity" },
      { word: "Epistemology", pronunciation: "ih-pis-tuh-MOL-uh-jee", definition: "The branch of philosophy concerned with the nature and limits of knowledge", example: "Her dissertation addressed a core question in epistemology: how do we know what we claim to know?", category: "Critical Thinking" },
      { word: "Circumlocution", pronunciation: "ser-kum-loh-KYOO-shun", definition: "Using many words where fewer would suffice; roundabout expression", example: "Rather than say 'no,' he used such elaborate circumlocution that she left the meeting unsure what he'd actually decided.", category: "Language & Rhetoric" },
      { word: "Fallacious", pronunciation: "fuh-LAY-shus", definition: "Containing a logical error or misleading reasoning", example: "His argument was fallacious at its core: the data he cited didn't support the conclusion he drew.", category: "Arguments & Reasoning" },
      { word: "Ostensible", pronunciation: "os-TEN-sih-bul", definition: "Appearing to be true on the surface, but not necessarily so", example: "The ostensible reason for the meeting was budget review; the real agenda was to sideline the CFO.", category: "Ideas & Claims" },
      { word: "Presentism", pronunciation: "PREZ-ent-iz-um", definition: "Judging the past by present-day standards and values", example: "Judging Victorian novelists by today's standards of representation is a form of presentism — they operated in a very different world.", category: "Bias & Perspective" },
      { word: "Palimpsest", pronunciation: "PAL-imp-sest", definition: "Something altered but still bearing visible traces of its earlier form", example: "The city is a palimpsest: new buildings stand over Roman foundations, and medieval street plans still shape modern traffic.", category: "Nuance & Complexity" },
      { word: "Socratic", pronunciation: "suh-KRAT-ik", definition: "Using probing questions to expose false beliefs and reach deeper truth", example: "His Socratic approach in meetings — asking questions rather than giving answers — surfaced assumptions no one had challenged.", category: "Critical Thinking" },
      { word: "Reductio ad Absurdum", pronunciation: "rih-DUK-tee-oh ad ab-SER-dum", definition: "Disproving a claim by showing it leads to an absurd conclusion", example: "She used reductio ad absurdum to show the policy couldn't work: taken to its logical conclusion, it would ban all commerce.", category: "Arguments & Reasoning" },
      { word: "Spurious", pronunciation: "SPYOOR-ee-us", definition: "False, misleading, or not genuine in appearance", example: "The correlation between ice cream sales and drowning rates is spurious — both are driven by summer heat.", category: "Ideas & Claims" },
      { word: "Myopic", pronunciation: "my-OH-pik", definition: "Lacking foresight; short-sighted in perspective or thinking", example: "The board's myopic focus on this quarter's numbers blinded them to the long-term competitive threat.", category: "Bias & Perspective" },
      { word: "Antithetical", pronunciation: "an-tih-THET-ih-kul", definition: "Directly opposed or contrasted; the exact opposite", example: "Cutting the research budget was antithetical to everything the organization claimed to stand for.", category: "Nuance & Complexity" },
      { word: "Falsifiable", pronunciation: "FAL-sih-fy-uh-bul", definition: "Capable of being proven false by evidence; a key criterion of science", example: "A claim that isn't falsifiable isn't science — it's closer to metaphysics.", category: "Critical Thinking" },
      { word: "Apodictic", pronunciation: "ap-uh-DIK-tik", definition: "Clearly demonstrated; necessarily true beyond dispute", example: "The mathematical proof was apodictic — once you accepted the axioms, the conclusion was inescapable.", category: "Arguments & Reasoning" },
      { word: "Normative", pronunciation: "NOR-muh-tiv", definition: "Relating to standards or norms of what ought to be, not what is", example: "The question of how taxes should be distributed is normative, not empirical — it's about values, not facts.", category: "Ideas & Claims" },
      { word: "Relativism", pronunciation: "REL-uh-tiv-iz-um", definition: "The view that truth and morality are not absolute but depend on perspective", example: "Her relativism made her reluctant to criticize any cultural practice, even ones she personally found harmful.", category: "Bias & Perspective" },
      { word: "Iterative", pronunciation: "IT-er-uh-tiv", definition: "Progressing through repeated cycles of refinement or improvement", example: "Good writing is an iterative process — the first draft is just the starting point.", category: "Nuance & Complexity" },
      { word: "Chiasmus", pronunciation: "ky-AZ-mus", definition: "Reversing the grammatical structure of parallel phrases for stylistic effect", example: "JFK's 'ask not what your country can do for you — ask what you can do for your country' is a perfect chiasmus.", category: "Language & Rhetoric" },
      { word: "Post Hoc", pronunciation: "pohst HOK", definition: "Wrongly assuming that because B follows A, A caused B", example: "Assuming the new CEO caused the stock rise is post hoc reasoning — the market had already been recovering.", category: "Arguments & Reasoning" },
      { word: "Empirical", pronunciation: "em-PIR-ih-kul", definition: "Based on observation and evidence rather than theory or assumption", example: "The theory needed empirical support — elegant reasoning alone wouldn't convince the committee.", category: "Ideas & Claims" },
      { word: "Dogmatic", pronunciation: "dog-MAT-ik", definition: "Rigidly adhering to a set of beliefs without questioning or nuance", example: "He was so dogmatic about the old methodology that he refused to consider any study that used a different approach.", category: "Bias & Perspective" },
      { word: "Systemic", pronunciation: "sis-TEM-ik", definition: "Relating to or embedded throughout a whole system, not just one part", example: "The problem wasn't any one bad actor — the failures were systemic, embedded in the incentive structure itself.", category: "Nuance & Complexity" },
      { word: "Ontological", pronunciation: "on-tuh-LOJ-ih-kul", definition: "Relating to the nature of being, existence, or reality itself", example: "The ontological question — what kind of thing is a corporation, exactly? — has real legal consequences.", category: "Critical Thinking" },
      { word: "False Dichotomy", pronunciation: "fawls dy-KOT-uh-mee", definition: "Presenting only two options when more alternatives exist", example: "Framing it as 'either you're with us or against us' is a false dichotomy that ignores every other position.", category: "Arguments & Reasoning" },
      { word: "Substantive", pronunciation: "SUB-stan-tiv", definition: "Having a firm basis in reality; meaningful and not superficial", example: "After hours of discussion, they finally reached a substantive agreement on the key sticking points.", category: "Ideas & Claims" },
      { word: "Perspicacious", pronunciation: "per-spih-KAY-shus", definition: "Having a ready insight; shrewd and perceptive in judgment", example: "A perspicacious reader would have noticed the inconsistency in chapter two that undermines the whole thesis.", category: "Bias & Perspective" },
      { word: "Mercurial", pronunciation: "mer-KYOOR-ee-ul", definition: "Subject to sudden or unpredictable changes; volatile", example: "His mercurial temperament made him brilliant in bursts but exhausting to work with over time.", category: "Nuance & Complexity" },
      { word: "Synecdoche", pronunciation: "sih-NEK-duh-kee", definition: "Using a part to represent the whole, or the whole to represent a part", example: "Asking for 'a hand' is synecdoche — you're not asking for a literal hand, but for the person attached to it.", category: "Language & Rhetoric" },
      { word: "Aporia", pronunciation: "uh-POR-ee-uh", definition: "A state of philosophical puzzlement or an unanswerable question", example: "The panel ended in aporia, with every proposed solution generating more unresolvable questions than answers.", category: "Arguments & Reasoning" },
      { word: "Putative", pronunciation: "PYOO-tuh-tiv", definition: "Generally accepted or supposed to be the case, often without proof", example: "The putative author of the manuscript has never been definitively confirmed.", category: "Ideas & Claims" },
      { word: "Sycophantic", pronunciation: "sik-uh-FAN-tik", definition: "Fawningly complimentary; excessively agreeable to gain favor", example: "The sycophantic applause at every executive statement made honest feedback impossible.", category: "Bias & Perspective" },
      { word: "Deontological", pronunciation: "dee-on-tuh-LOJ-ih-kul", definition: "Relating to duty-based ethics: judging actions by rules, not outcomes", example: "From a deontological standpoint, lying to protect someone is still wrong, regardless of the outcome.", category: "Critical Thinking" },
      { word: "Metonymy", pronunciation: "meh-TON-uh-mee", definition: "Referring to something by the name of an associated concept", example: "Saying 'the White House announced' is metonymy — the building didn't speak; the administration did.", category: "Language & Rhetoric" },
      { word: "Heuristic", pronunciation: "hyoo-RIS-tik", definition: "A practical problem-solving approach that is useful but not guaranteed to be optimal", example: "Using price as a heuristic for quality is usually reliable, but it breaks down at the extremes.", category: "Arguments & Reasoning" },
      { word: "Taxonomy", pronunciation: "tak-SON-uh-mee", definition: "A systematic scheme of classification or categorization", example: "The biologist proposed a new taxonomy that reorganized thousands of species based on genetics rather than physical traits.", category: "Ideas & Claims" },
      { word: "Credulous", pronunciation: "KREJ-uh-lus", definition: "Too ready to believe things without sufficient evidence; gullible", example: "He was credulous enough to believe the email promising a lottery prize, despite the obvious red flags.", category: "Bias & Perspective" },
      { word: "Bifurcated", pronunciation: "BY-fer-kay-ted", definition: "Divided or forked into two distinct branches or directions", example: "The report revealed a bifurcated market: premium products were thriving while the mid-range collapsed.", category: "Nuance & Complexity" },
      { word: "Consequentialist", pronunciation: "kon-sih-KWEN-shul-ist", definition: "Judging the morality of actions by their outcomes and effects", example: "The consequentialist case for the policy was strong: outcomes improved across every metric that mattered.", category: "Critical Thinking" },
      { word: "Occam's Razor", definition: "The principle that the simplest sufficient explanation is usually correct", category: "Arguments & Reasoning" },
      { word: "Teleological", definition: "Relating to or explained by purpose, design, or final goals", category: "Ideas & Claims" },
      { word: "Insular", definition: "Narrow-minded due to isolation from outside perspectives or experiences", category: "Bias & Perspective" },
      { word: "Reification", definition: "Treating an abstract concept as if it were a concrete, tangible thing", category: "Critical Thinking" },
      { word: "Dysphemism", definition: "A harsh or blunt expression used in place of a more neutral one", category: "Language & Rhetoric" },
      { word: "Modus Ponens", pronunciation: "MOH-dus POH-nenz", definition: "If P implies Q, and P is true, then Q must be true", example: "The argument followed modus ponens: if the contract was signed it's binding — it was signed, so it's binding.", category: "Arguments & Reasoning" },
      { word: "Probative", pronunciation: "PROH-buh-tiv", definition: "Having the quality of proving or demonstrating something", example: "The defense objected that the footage had no probative value — it showed nothing relevant to the charge.", category: "Ideas & Claims" },
      { word: "Chauvinism", pronunciation: "SHOH-vin-iz-um", definition: "Excessive belief in the superiority of one's own group over others", example: "His chauvinism wasn't overt; it revealed itself in the small assumptions he made about who should lead.", category: "Bias & Perspective" },
      { word: "Recursive", pronunciation: "rih-KER-siv", definition: "Defined in terms of itself; self-referential in structure or process", example: "The algorithm was recursive, calling itself with smaller inputs until it hit the base case.", category: "Nuance & Complexity" },
      { word: "Anaphora", pronunciation: "uh-NAF-uh-ruh", definition: "Deliberate repetition of a phrase at the start of successive clauses", example: "The speech used anaphora to build momentum, opening nine consecutive sentences with 'We will not.'", category: "Language & Rhetoric" },
      { word: "Petitio Principii", pronunciation: "peh-TIH-tee-oh prin-SIP-ee-eye", definition: "Assuming the conclusion within the premise; circular reasoning", example: "His argument committed petitio principii, assuming the very thing he was supposed to prove.", category: "Arguments & Reasoning" },
      { word: "Axiomatic", pronunciation: "ak-see-uh-MAT-ik", definition: "Self-evidently true; accepted without requiring proof", example: "It was axiomatic in that era that economic growth required cheap energy — a premise few questioned until the crisis.", category: "Ideas & Claims" },
      { word: "Immanent", pronunciation: "IM-uh-nent", definition: "Existing or operating within something; inherent rather than external", example: "The tension was immanent in the design — it couldn't be fixed by patching symptoms.", category: "Nuance & Complexity" },
      { word: "Analogical", pronunciation: "an-uh-LOJ-ih-kul", definition: "Based on analogy or comparison between structurally similar cases", example: "Her analogical argument compared the new regulation to a successful precedent in the pharmaceutical industry.", category: "Critical Thinking" },
      { word: "Polysemous", pronunciation: "pol-ee-SEE-mus", definition: "A word or phrase having multiple distinct but related meanings", example: "The word 'critical' is polysemous — it can mean analytical, essential, or deeply negative depending on context.", category: "Language & Rhetoric" },
      { word: "Pedantic", pronunciation: "pih-DAN-tik", definition: "Overly focused on minor details and technicalities at the expense of the bigger picture", example: "His feedback was pedantic — three pages of notes on comma placement and nothing on the actual argument.", category: "Ideas & Claims" },
      { word: "Oblique", pronunciation: "uh-BLEEK", definition: "Indirect; not approaching a subject or problem directly", example: "Rather than confront the issue directly, she made her objections in an oblique comment about 'process concerns.'", category: "Nuance & Complexity" },
      { word: "Synthesis", pronunciation: "SIN-thuh-sis", definition: "Combining distinct elements or ideas into a new, coherent whole", example: "The final report was a synthesis of three years of fieldwork, interviews, and conflicting secondary sources.", category: "Critical Thinking" },
      { word: "Litotes", pronunciation: "LY-tuh-teez", definition: "Understatement that affirms something by negating its opposite", example: "Saying the presentation 'wasn't bad' was litotes — she thought it was excellent but didn't want to gush.", category: "Language & Rhetoric" },
      { word: "Hyperbole", pronunciation: "hy-PER-buh-lee", definition: "Deliberate exaggeration for emphasis, drama, or comic effect", example: "Calling it 'the worst decision in human history' was hyperbole, but the frustration behind it was real.", category: "Language & Rhetoric" },
      { word: "Didactic", pronunciation: "dy-DAK-tik", definition: "Intended to teach or instruct, sometimes in an overly moralistic way", example: "The novel was well-written but didactic — every scene seemed designed to deliver a moral lesson.", category: "Ideas & Claims" },
      { word: "Categorical", pronunciation: "kat-uh-GOR-ih-kul", definition: "Absolute and unconditional; admitting no exceptions", example: "Her refusal was categorical — no exceptions, no negotiation, no revisiting the decision.", category: "Critical Thinking" },
      { word: "Heuristics", pronunciation: "hyoo-RIS-tiks", definition: "Mental shortcuts and rules of thumb that speed up decision-making", example: "Experienced doctors rely on heuristics — pattern-matching built from thousands of cases — when time is short.", category: "Critical Thinking" },
      { word: "Aphorism", pronunciation: "AF-uh-riz-um", definition: "A concise, pithy statement expressing a general truth or principle", example: "'Show, don't tell' is the writer's aphorism that has launched a thousand bad rewrites.", category: "Language & Rhetoric" },
      { word: "Prolix", pronunciation: "PROH-liks", definition: "Using an excessively large number of words; tediously long-winded", example: "The brief was so prolix that the judge asked counsel to submit a ten-page summary instead.", category: "Language & Rhetoric" },
      { word: "Pleonasm", pronunciation: "PLEE-uh-naz-um", definition: "Using more words than necessary to express an idea", example: "'Free gift' is a pleonasm — all gifts are free by definition.", category: "Language & Rhetoric" },
      { word: "Malapropism", pronunciation: "MAL-uh-prop-iz-um", definition: "Mistaken use of a word in place of a similar-sounding one", example: "Saying 'for all intensive purposes' instead of 'intents and purposes' is a classic malapropism.", category: "Language & Rhetoric" },
      { word: "Pellucid", pronunciation: "puh-LOO-sid", definition: "Transparently clear and easy to understand", example: "Her pellucid explanation cut through three days of confusion in ten minutes.", category: "Arguments & Reasoning" },
      { word: "Nascent", pronunciation: "NAY-sent", definition: "Just beginning to exist or develop; not yet fully formed", example: "The nascent field of behavioral economics had yet to earn the respect of mainstream academia.", category: "Ideas & Claims" },
      { word: "Jaundiced", pronunciation: "JAWN-dist", definition: "Cynically biased; colored by resentment or bitter experience", example: "A jaundiced reading of the report saw malice where there was probably just incompetence.", category: "Bias & Perspective" },
      { word: "Tenuous", pronunciation: "TEN-yoo-us", definition: "Very weak or slight; not firmly grounded or supported", example: "The connection between the two findings was tenuous — interesting to note but not worth building on.", category: "Nuance & Complexity" },
      { word: "Lapidary", pronunciation: "LAP-ih-der-ee", definition: "Elegant and concise; having the precision and polish of a carved inscription", example: "The lapidary prose of her op-ed — not a word wasted — made it quotable in a way academic papers rarely are.", category: "Language & Rhetoric" },
      { word: "Discursive", pronunciation: "DIS-ker-siv", definition: "Tending to digress; moving through topics without tight logical structure", example: "His discursive lecture covered everything from Plato to behavioral economics but never landed on a central thesis.", category: "Arguments & Reasoning" },
      { word: "Jejune", pronunciation: "jih-JOON", definition: "Naively simplistic; lacking depth, nuance, or intellectual substance", example: "The analysis was jejune — it treated a decades-old conflict as if it had a simple villain and victim.", category: "Ideas & Claims" },
      { word: "Hagiographic", pronunciation: "hay-jee-uh-GRAF-ik", definition: "Excessively admiring; uncritically worshipful of a subject", example: "The hagiographic biography glossed over its subject's failures and painted a saint instead.", category: "Bias & Perspective" },
      { word: "Paradoxical", pronunciation: "pair-uh-DOK-sih-kul", definition: "Seemingly self-contradictory yet possibly true", example: "It's paradoxical but well-documented: giving employees more autonomy often increases their productivity.", category: "Nuance & Complexity" },
      { word: "Trenchant", pronunciation: "TREN-chunt", definition: "Vigorously incisive; sharp and effective in analysis or criticism", example: "Her trenchant review left no part of the argument standing, but identified exactly what could be salvaged.", category: "Critical Thinking" },
      { word: "Polemical", pronunciation: "puh-LEM-ih-kul", definition: "Relating to strong written or verbal attack on another's opinions or principles", example: "The polemical nature of the piece made it a lightning rod — praised by allies, dismissed by critics.", category: "Arguments & Reasoning" },
      { word: "Iconoclastic", pronunciation: "eye-kon-uh-KLAS-tik", definition: "Challenging or attacking cherished beliefs or established institutions", example: "Her iconoclastic research rejected decades of consensus and forced the field to reconsider its foundations.", category: "Ideas & Claims" },
      { word: "Sanguine", pronunciation: "SANG-gwin", definition: "Optimistic to a fault, especially when circumstances don't warrant it", example: "She was sanguine about the timeline, which didn't account for the three approvals still pending.", category: "Bias & Perspective" },
      { word: "Ineffable", pronunciation: "in-EF-uh-bul", definition: "Too great, complex, or extreme to be expressed in words", example: "The ineffable quality of the moment resisted every attempt to describe it adequately in the report.", category: "Nuance & Complexity" },
      { word: "Erudite", pronunciation: "ER-yoo-dyt", definition: "Having or showing extensive knowledge acquired from reading and study", example: "Her erudite command of the historical literature put every objection in its proper context.", category: "Critical Thinking" },
      { word: "Plausible", pronunciation: "PLAW-zih-bul", definition: "Seemingly reasonable or probable, though not confirmed by evidence", example: "The theory was plausible on its face, but it hadn't survived a single rigorous test.", category: "Arguments & Reasoning" },
      { word: "Anodyne", pronunciation: "AN-uh-dyn", definition: "Unlikely to cause controversy; blandly inoffensive", example: "The committee's anodyne statement pleased no one and committed to nothing.", category: "Ideas & Claims" },
      { word: "Blinkered", pronunciation: "BLING-kerd", definition: "Having a severely limited outlook; willfully narrow in perspective", example: "The blinkered focus on short-term costs ignored every long-term benefit the plan would deliver.", category: "Bias & Perspective" },
      { word: "Labyrinthine", pronunciation: "lab-uh-RIN-thin", definition: "Intricately complex; bewilderingly complicated", example: "The labyrinthine regulatory environment had produced rules that contradicted each other at every level.", category: "Nuance & Complexity" },
      { word: "Incisive", pronunciation: "in-SY-siv", definition: "Intelligently analytical; penetrating directly to the heart of a matter", example: "One incisive question from the auditor exposed the flaw the entire review committee had missed.", category: "Critical Thinking" },
      { word: "Speculative", pronunciation: "SPEK-yoo-lay-tiv", definition: "Based on conjecture rather than firm evidence", example: "The claims were speculative at best — interesting to consider, but impossible to verify.", category: "Arguments & Reasoning" },
      { word: "Contentious", pronunciation: "kun-TEN-shus", definition: "Causing or likely to cause argument or disagreement", example: "The contentious claim that inequality increases growth has been debated for decades without resolution.", category: "Ideas & Claims" },
      { word: "Quixotic", pronunciation: "kwik-SOT-ik", definition: "Exceedingly idealistic and impractical; chasing unrealistic goals", example: "The quixotic campaign to reform the filibuster never got past the first procedural vote.", category: "Bias & Perspective" },
      { word: "Protean", pronunciation: "PROH-tee-un", definition: "Readily taking on different forms; versatile and constantly changing", example: "The concept proved protean, meaning different things in different disciplines and resisting any fixed definition.", category: "Nuance & Complexity" },
      { word: "Mellifluous", pronunciation: "meh-LIF-loo-us", definition: "Pleasingly smooth and musical; sweet-sounding and flowing in expression", example: "The mellifluous prose of the closing argument held the jury's attention even through the technical details.", category: "Language & Rhetoric" },
      { word: "Vacuous", pronunciation: "VAK-yoo-us", definition: "Lacking substance; intellectually hollow or devoid of meaningful content", example: "The statement sounded profound but was vacuous — just repeated vaguely inspiring words.", category: "Arguments & Reasoning" },
      { word: "Nebulous", pronunciation: "NEB-yoo-lus", definition: "Unclear and vague; lacking definite form or specificity", example: "The proposal was frustratingly nebulous — full of intent but empty of any concrete plan.", category: "Ideas & Claims" },
      { word: "Sanctimonious", pronunciation: "sank-tih-MOH-nee-us", definition: "Making an ostentatious display of moral superiority", example: "His sanctimonious response to every criticism made the team reluctant to raise concerns at all.", category: "Bias & Perspective" },
      { word: "Intractable", pronunciation: "in-TRAK-tuh-bul", definition: "Stubbornly persistent; resistant to resolution or management", example: "The conflict had become intractable: every proposed solution generated new grievances.", category: "Nuance & Complexity" },
      { word: "Bombastic", pronunciation: "bom-BAS-tik", definition: "High-sounding but with little real meaning; inflated and pompous in style", example: "The bombastic press release announced a 'paradigm-shifting breakthrough' that turned out to be a minor update.", category: "Language & Rhetoric" },
      { word: "Latent", pronunciation: "LAY-tent", definition: "Present but not yet manifest or active; hidden beneath the surface", example: "The latent tension between the two departments finally broke into the open during the restructuring.", category: "Nuance & Complexity" },
      { word: "Circumspect", pronunciation: "SER-kum-spekt", definition: "Careful to consider all circumstances and potential consequences before acting", example: "The circumspect approach — running three pilots before committing — looked slow but saved them from a costly mistake.", category: "Critical Thinking" },
      { word: "Grandiloquent", pronunciation: "gran-DIL-uh-kwent", definition: "Using pompous, inflated language that exceeds what the situation requires", example: "The grandiloquent announcement of a minor process improvement drew more eye-rolls than applause.", category: "Language & Rhetoric" },
      { word: "Platitudinous", pronunciation: "plat-ih-TOO-dih-nus", definition: "Full of overused, trite statements that have lost all meaning", example: "The platitudinous keynote offered nothing but familiar homilies dressed in new slides.", category: "Ideas & Claims" },
      { word: "Supercilious", pronunciation: "soo-per-SIL-ee-us", definition: "Disdainfully dismissive of others; behaving as if one is superior", example: "Her supercilious dismissal of junior team members' ideas created a culture of silence.", category: "Bias & Perspective" },
      { word: "Irrefutable", pronunciation: "ih-REF-yoo-tuh-bul", definition: "Impossible to deny, challenge, or disprove", example: "The DNA evidence was irrefutable — no alternative explanation could account for it.", category: "Arguments & Reasoning" },
      { word: "Chimerical", pronunciation: "ky-MER-ih-kul", definition: "Wildly fanciful; based on unrealistic illusion rather than genuine possibility", example: "The plan to eliminate poverty in a single term was chimerical — inspiring to say, impossible to do.", category: "Ideas & Claims" },
      { word: "Doctrinaire", pronunciation: "dok-trih-NAIR", definition: "Rigidly applying abstract theories without regard for practical reality", example: "His doctrinaire approach to economic theory ignored decades of evidence that the model didn't work.", category: "Bias & Perspective" },
      { word: "Fraught", pronunciation: "FRAWT", definition: "Filled with tension, difficulty, or potential for trouble", example: "The relationship between the two agencies was fraught, shaped by decades of jurisdictional conflict.", category: "Nuance & Complexity" },
      { word: "Mordant", pronunciation: "MOR-dunt", definition: "Biting, sarcastic, and sharply critical in expression", example: "Her mordant observation — delivered without a pause — stopped the meeting cold.", category: "Language & Rhetoric" },
      { word: "Incontrovertible", pronunciation: "in-kon-truh-VER-tih-bul", definition: "Too certain to be disputed; unquestionably established", example: "The financial records provided incontrovertible evidence of systematic fraud.", category: "Arguments & Reasoning" },
      { word: "Sacrosanct", pronunciation: "SAK-roh-sankt", definition: "Regarded as too important or established to be questioned or changed", example: "The quarterly earnings call had become so sacrosanct that no one dared question its format.", category: "Ideas & Claims" },
      { word: "Machiavellian", pronunciation: "mak-ee-uh-VEL-ee-un", definition: "Cunning and unscrupulous; willing to use any means to achieve an end", example: "The Machiavellian maneuvering that kept him in power worked until it finally ran out of allies to sacrifice.", category: "Bias & Perspective" },
      { word: "Metacognitive", pronunciation: "met-uh-KOG-nih-tiv", definition: "Relating to awareness and understanding of one's own thought processes", example: "Metacognitive awareness — knowing when you don't actually understand something — is rarer than it sounds.", category: "Critical Thinking" },
      { word: "Sesquipedalian", pronunciation: "ses-kwih-pih-DAY-lee-un", definition: "Given to or characterized by the use of long, obscure words", example: "His sesquipedalian writing style was technically precise but alienated anyone outside the field.", category: "Language & Rhetoric" },
      { word: "Casuistic", pronunciation: "kaz-yoo-IS-tik", definition: "Using clever but potentially flawed case-by-case moral reasoning", example: "The lawyer's casuistic defense tried to show that every rule had an exception that applied here.", category: "Arguments & Reasoning" },
      { word: "Meretricious", pronunciation: "mer-ih-TRISH-us", definition: "Apparently attractive but having no real value or integrity; falsely alluring", example: "The meretricious packaging of the research — flashy graphics, bold claims — couldn't disguise the thin methodology.", category: "Ideas & Claims" },
      { word: "Sectarian", pronunciation: "sek-TAIR-ee-un", definition: "Narrowly loyal to a faction; treating in-group loyalty as the highest value", example: "The sectarian framing of the debate made compromise structurally impossible.", category: "Bias & Perspective" },
      { word: "Penumbral", pronunciation: "pih-NUM-brul", definition: "Existing in an indistinct, partially shadowed boundary zone between categories", example: "The penumbral zone between satire and misinformation is where the most dangerous content lives.", category: "Nuance & Complexity" },
      { word: "Euphonious", pronunciation: "yoo-FOH-nee-us", definition: "Pleasing to the ear; having an agreeably smooth and musical sound", example: "The brand chose a euphonious name with no meaning at all — just sounds that felt trustworthy.", category: "Language & Rhetoric" },
      { word: "Eristic", pronunciation: "ih-RIS-tik", definition: "Relating to controversy or debate for its own sake rather than truth", example: "The eristic back-and-forth between the two commentators generated heat but no light.", category: "Arguments & Reasoning" },
      { word: "Pernicious", pronunciation: "per-NISH-us", definition: "Having a subtle but seriously harmful effect on thinking or belief", example: "The pernicious assumption that markets are always self-correcting outlasted every crisis that should have disproved it.", category: "Ideas & Claims" },
      { word: "Fatalistic", pronunciation: "fay-tuh-LIS-tik", definition: "Believing outcomes are predetermined; resigned to what appears inevitable", example: "A fatalistic reading of the data assumes the trend can't be reversed, which isn't true.", category: "Bias & Perspective" },
      { word: "Capricious", pronunciation: "kuh-PRISH-us", definition: "Given to sudden and unaccountable changes; unpredictable in behavior or outcome", example: "The capricious enforcement of the rule undermined trust more than the rule itself had.", category: "Nuance & Complexity" },
      { word: "Sagacious", pronunciation: "suh-GAY-shus", definition: "Having keen mental discernment; shrewd and wise in judgment", example: "The sagacious investor recognized the pattern months before anyone else named it as a trend.", category: "Critical Thinking" },
      { word: "Elliptical", pronunciation: "ih-LIP-tih-kul", definition: "With key steps omitted; cryptically indirect in expression", example: "His elliptical response left the board uncertain whether he'd actually agreed or politely declined.", category: "Arguments & Reasoning" },
      { word: "Heretical", pronunciation: "huh-RET-ih-kul", definition: "Contrary to established doctrine or accepted belief", example: "Challenging efficient market theory was heretical in the 1990s — the paper was nearly rejected outright.", category: "Ideas & Claims" },
      { word: "Priggish", pronunciation: "PRIG-ish", definition: "Self-righteously correct; smugly adhering to narrow standards of propriety", example: "His priggish insistence on procedure held up the project for two weeks over a formatting issue.", category: "Bias & Perspective" },
      { word: "Mutable", pronunciation: "MYOO-tuh-bul", definition: "Subject to change; not fixed or stable in form or character", example: "The mutable nature of the evidence made any firm conclusion premature.", category: "Nuance & Complexity" },
      { word: "Synoptic", pronunciation: "sih-NOP-tik", definition: "Affording a comprehensive view of a whole; taking in the big picture", example: "What the report needed wasn't more data — it needed a synoptic framework to make sense of what was already there.", category: "Critical Thinking" },
      { word: "Apophatic", pronunciation: "ap-uh-FAT-ik", definition: "Describing something by stating what it is not, rather than what it is", example: "The apophatic approach to defining consciousness tells us more about our limits than about the mind itself.", category: "Arguments & Reasoning" },
      { word: "Complacent", pronunciation: "kum-PLAY-sent", definition: "Uncritically satisfied with oneself; oblivious to risks or potential problems", example: "The complacent leadership team assumed past success was a reliable guide to the future.", category: "Bias & Perspective" },
      { word: "Polyphonic", pronunciation: "pol-ee-FON-ik", definition: "Containing many distinct and simultaneous voices or perspectives", example: "The polyphonic debate revealed just how many legitimate stakeholders had been left out of the original design.", category: "Nuance & Complexity" },
      { word: "Judicious", pronunciation: "joo-DISH-us", definition: "Having sound judgment; sensible and careful in decisions", example: "A judicious editor removed the three paragraphs that were accurate but would have derailed the argument.", category: "Critical Thinking" },
      { word: "Florid", pronunciation: "FLOR-id", definition: "Elaborately ornate; using excessively embellished or flowery language", example: "The florid descriptions in his early work gave way to the spare, precise style that made him famous.", category: "Language & Rhetoric" },
      { word: "Paralogical", pronunciation: "pair-uh-LOJ-ih-kul", definition: "Based on or exhibiting faulty or invalid logic", example: "The paralogical conclusion — that correlation proved causation — infected the entire study.", category: "Arguments & Reasoning" },
      { word: "Recondite", pronunciation: "REK-un-dyt", definition: "Known only to specialists; obscure and not widely understood", example: "The recondite argument required knowledge of Byzantine tax law that most readers simply didn't have.", category: "Ideas & Claims" },
      { word: "Idiosyncratic", pronunciation: "id-ee-oh-sin-KRAT-ik", definition: "Peculiar to the individual; reflecting personal quirks over shared standards", example: "Her idiosyncratic reading of the data wasn't wrong, but it required assumptions no one else shared.", category: "Bias & Perspective" },
      { word: "Kaleidoscopic", pronunciation: "kuh-ly-duh-SKOP-ik", definition: "Rapidly and unpredictably changing; made up of many shifting elements", example: "The kaleidoscopic political landscape made long-term forecasting nearly pointless.", category: "Nuance & Complexity" },
      { word: "Aphoristic", pronunciation: "af-uh-RIS-tik", definition: "Resembling or given to using concise, memorable sayings", example: "The aphoristic style suited the medium — short, punchy lines work better in a speech than in a brief.", category: "Language & Rhetoric" },
      { word: "Tautological", pronunciation: "taw-tuh-LOJ-ih-kul", definition: "Needlessly circular; restating the same idea in different terms", example: "Defining freedom as 'the ability to be free' is tautological — it explains nothing new.", category: "Arguments & Reasoning" },
      { word: "Incendiary", pronunciation: "in-SEN-dee-er-ee", definition: "Designed to inflame strong emotion or controversy", example: "The incendiary headline misrepresented the study and ignited a week of misdirected outrage.", category: "Ideas & Claims" },
      { word: "Jingoistic", pronunciation: "jing-goh-IS-tik", definition: "Excessively and aggressively nationalistic in perspective", example: "The jingoistic rhetoric was designed to win applause, not to describe the actual situation abroad.", category: "Bias & Perspective" },
      { word: "Refractory", pronunciation: "rih-FRAK-tuh-ree", definition: "Stubbornly resistant to resolution; persisting despite repeated attempts to fix it", example: "The problem was refractory — it kept reemerging in new forms despite repeated attempts to address it.", category: "Nuance & Complexity" },
      { word: "Periphrastic", pronunciation: "per-ih-FRAS-tik", definition: "Using indirect, roundabout expressions where simpler language would suffice", example: "The periphrastic policy language obscured a simple rule: no late submissions, no exceptions.", category: "Language & Rhetoric" },
      { word: "Syllogistic", pronunciation: "sil-uh-JIS-tik", definition: "Following the form of formal logical deduction from premises to conclusion", example: "The syllogistic structure of the argument was unassailable, but the first premise was contested.", category: "Arguments & Reasoning" },
      { word: "Abstruse", pronunciation: "ab-STROOS", definition: "Difficult to comprehend; obscure and highly technical", example: "The proof was so abstruse that only a handful of mathematicians worldwide could evaluate it.", category: "Ideas & Claims" },
      { word: "Variegated", pronunciation: "VAIR-ee-uh-gay-ted", definition: "Exhibiting variety and diversity; marked by many different forms or characteristics", example: "The variegated responses to the policy revealed just how differently it affected different groups.", category: "Nuance & Complexity" },
      { word: "Dispassionate", pronunciation: "dis-PASH-uh-nit", definition: "Not influenced by strong emotion; objective and impartial in judgment", example: "Her dispassionate analysis of the failure was more useful than the defensive reactions from the team.", category: "Critical Thinking" },
      { word: "Limpid", pronunciation: "LIM-pid", definition: "Clear and simple; unmarred by unnecessary complexity or obscurity", example: "The limpid clarity of her explanation was the product of years of thinking hard about how to say it plainly.", category: "Language & Rhetoric" },
      { word: "Sophistic", pronunciation: "suh-FIS-tik", definition: "Superficially clever but actually deceptive or misleading", example: "The sophistic argument sounded impressive until you realized the key premise was undefined.", category: "Arguments & Reasoning" },
      { word: "Derivative", pronunciation: "dih-RIV-uh-tiv", definition: "Lacking originality; imitative of prior work without adding new insight", example: "The research was derivative, reproducing earlier findings without contributing anything new.", category: "Ideas & Claims" },
      { word: "Xenophobic", pronunciation: "zen-uh-FOH-bik", definition: "Harboring irrational fear or distrust of those outside one's group", example: "The xenophobic framing of the immigration debate made nuanced policy discussion nearly impossible.", category: "Bias & Perspective" },
      { word: "Aporetic", pronunciation: "ay-puh-RET-ik", definition: "Characterized by philosophical puzzlement without clear resolution", example: "The discussion arrived at an aporetic impasse — neither side could disprove the other's premises.", category: "Nuance & Complexity" },
      { word: "Scrupulous", pronunciation: "SKROO-pyoo-lus", definition: "Careful and precise; attentive to doing things correctly and thoroughly", example: "Her scrupulous documentation of every decision made the audit trivially easy.", category: "Critical Thinking" },
      { word: "Perspicuous", pronunciation: "per-SPIK-yoo-us", definition: "Clearly expressed and immediately understandable; transparent in meaning", example: "A perspicuous summary of the findings would have saved everyone three hours of debate.", category: "Ideas & Claims" },
      { word: "Analytical", pronunciation: "an-uh-LIT-ih-kul", definition: "Relating to or using the method of breaking complex things into component parts", example: "The most analytical member of the team spotted the flaw in the model that everyone else had missed.", category: "Critical Thinking" },
      { word: "Eclectic", pronunciation: "ih-KLEK-tik", definition: "Deriving ideas from a broad and diverse range of sources", example: "Her eclectic approach — drawing on philosophy, economics, and neuroscience — was unusual but effective.", category: "Critical Thinking" },
      { word: "Bathetic", pronunciation: "buh-THET-ik", definition: "Anticlimactically descending from the serious to the trivial; producing an effect of bathos", example: "The speech was bathetic — a soaring tribute to sacrifice followed immediately by a complaint about the parking.", category: "Language & Rhetoric" },
      { word: "Allusive", pronunciation: "uh-LOO-siv", definition: "Containing many indirect references; suggesting without stating directly", example: "The allusive prose rewarded readers who recognized the references and baffled everyone else.", category: "Language & Rhetoric" },
      { word: "Skeptical", pronunciation: "SKEP-tih-kul", definition: "Not easily convinced; inclined to question claims rather than accept them at face value", example: "A skeptical reader will notice that the study never defines what it means by 'significant.'", category: "Critical Thinking" },
      { word: "Lucid", pronunciation: "LOO-sid", definition: "Clearly expressed; easy to follow through precise and careful organization", example: "His lucid walk-through of the model made it accessible to everyone in the room, not just the technologists.", category: "Critical Thinking" },
      { word: "Apposite", pronunciation: "AP-uh-zit", definition: "Highly pertinent and appropriate; directly relevant to the matter at hand", example: "The apposite quote from Keynes settled the debate without anyone having to restate the underlying argument.", category: "Critical Thinking" },
      { word: "Sententious", pronunciation: "sen-TEN-shus", definition: "Given to moralizing; using pithy maxims to deliver a moral point", example: "The sententious tone of the essay — one aphorism per paragraph — grew exhausting after the first few pages.", category: "Language & Rhetoric" },
      { word: "Cacophonous", pronunciation: "kuh-KOF-uh-nus", definition: "Harsh and discordant; jarring and unpleasant in sound or effect", example: "The cacophonous blend of competing metaphors made the memo painful to parse.", category: "Language & Rhetoric" },
      { word: "Rigorous", pronunciation: "RIG-er-us", definition: "Extremely thorough; not allowing for error, weakness, or imprecision", example: "The rigorous review process caught three methodological flaws before the paper was submitted.", category: "Critical Thinking" },
      { word: "Meticulous", pronunciation: "mih-TIK-yoo-lus", definition: "Showing great attention to detail; precise and thorough in execution", example: "The meticulous preparation paid off — there wasn't a single question the team couldn't answer.", category: "Critical Thinking" },
      { word: "Punctilious", pronunciation: "punk-TIL-ee-us", definition: "Showing great attention to correct behavior or detail; precise in following rules", example: "His punctilious adherence to procedure was admirable in audits but maddening in a fast-moving crisis.", category: "Critical Thinking" },
      { word: "Hortatory", pronunciation: "HOR-tuh-tor-ee", definition: "Giving strong encouragement; urging toward a particular course of action", example: "The hortatory tone of the memo made it feel more like a pep talk than a strategic directive.", category: "Language & Rhetoric" },
      { word: "Extemporaneous", pronunciation: "ek-stem-puh-RAY-nee-us", definition: "Spoken or composed without preparation; improvised on the spot", example: "His extemporaneous remarks at the end of the panel were sharper than anything in his prepared speech.", category: "Language & Rhetoric" },
    ];

    const categoryColors = {
      "Arguments & Reasoning": { bg: "#1a1a2e", accent: "#e94560", label: "#e94560" },
      "Ideas & Claims":        { bg: "#0f2027", accent: "#00b4d8", label: "#00b4d8" },
      "Bias & Perspective":    { bg: "#1a0a2e", accent: "#c77dff", label: "#c77dff" },
      "Nuance & Complexity":   { bg: "#0a1f1a", accent: "#52b788", label: "#52b788" },
      "Critical Thinking":     { bg: "#1f1a0a", accent: "#f4a261", label: "#f4a261" },
      "Language & Rhetoric":   { bg: "#0a1a1f", accent: "#48cae4", label: "#48cae4" },
    };

    function Flashcards() {
      const [index, setIndex] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [filter, setFilter] = useState("All");
      const [mode, setMode] = useState("study"); // "study" | "recall"
      const [userInput, setUserInput] = useState("");
      const [inputResult, setInputResult] = useState(null); // null | "correct" | "wrong"
      const [direction, setDirection] = useState(null);
      const inputRef = useRef(null);
      const touchStartX = useRef(null);
      const touchStartY = useRef(null);

      function handleTouchStart(e) {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
      }

      function handleTouchEnd(e) {
        if (touchStartX.current === null) return;
        const dx = touchStartX.current - e.changedTouches[0].clientX;
        const dy = Math.abs(touchStartY.current - e.changedTouches[0].clientY);
        // Only trigger swipe if horizontal movement dominates and is > 50px
        if (Math.abs(dx) > 50 && Math.abs(dx) > dy) {
          go(dx > 0 ? "next" : "prev");
        }
        touchStartX.current = null;
        touchStartY.current = null;
      }

      // Confidence map: word → 1-4 rating. Migrates from old binary mastered set.
      const [confidence, setConfidence] = useState(() => {
        try {
          const saved = localStorage.getItem("flashcard-confidence");
          if (saved) return JSON.parse(saved);
          const oldMastered = localStorage.getItem("flashcard-mastered");
          if (oldMastered) {
            const masteredSet = new Set(JSON.parse(oldMastered));
            const migrated = {};
            masteredSet.forEach(w => { migrated[w] = 3; });
            return migrated;
          }
        } catch {}
        return {};
      });

      const [dailyWords] = useState(() => {
        const todayKey = getTodayKey();
        try {
          const cached = localStorage.getItem(`flashcard-daily-${todayKey}`);
          if (cached) {
            const parsed = JSON.parse(cached);
            // Re-hydrate live fields so cache stays fresh after edits
            return parsed.map(w => {
              const live = words.find(cw => cw.word === w.word);
              return live ? { ...w, pronunciation: live.pronunciation, example: live.example } : w;
            });
          }
        } catch {}
        const masteredWords = new Set(
          Object.entries(confidence).filter(([, v]) => v >= 3).map(([k]) => k)
        );
        const nonMastered = shuffle(words.filter(w => !masteredWords.has(w.word)));
        const masteredArr = shuffle(words.filter(w => masteredWords.has(w.word)));
        const todaySet = [
          ...nonMastered.slice(0, 15),
          ...masteredArr.slice(0, 3).map(w => ({ ...w, isReview: true })),
        ];
        try {
          localStorage.setItem(`flashcard-daily-${todayKey}`, JSON.stringify(todaySet));
        } catch {}
        return todaySet;
      });

      useEffect(() => {
        try {
          localStorage.setItem("flashcard-confidence", JSON.stringify(confidence));
        } catch {}
      }, [confidence]);

      // Reset card state when mode changes
      useEffect(() => {
        setFlipped(false);
        setUserInput("");
        setInputResult(null);
      }, [mode]);

      // Auto-focus input in recall mode
      useEffect(() => {
        if (mode === "recall" && !flipped && inputRef.current) {
          setTimeout(() => inputRef.current?.focus(), 60);
        }
      }, [mode, flipped, index]);

      const categories = ["All", ...Object.keys(categoryColors).filter(cat => dailyWords.some(w => w.category === cat))];
      const filtered = filter === "All" ? dailyWords : dailyWords.filter(w => w.category === filter);
      const card = filtered[index] ?? filtered[0];
      const colors = categoryColors[card?.category] ?? categoryColors["Arguments & Reasoning"];
      const cardConfidence = confidence[card?.word] ?? 0;
      const masteredCount = Object.values(confidence).filter(v => v >= 3).length;

      function go(dir) {
        setDirection(dir);
        setFlipped(false);
        setUserInput("");
        setInputResult(null);
        setTimeout(() => {
          setIndex(i => dir === "next" ? (i + 1) % filtered.length : (i - 1 + filtered.length) % filtered.length);
          setDirection(null);
        }, 200);
      }

      function checkAnswer() {
        const correct = userInput.trim().toLowerCase() === card.word.toLowerCase();
        setInputResult(correct ? "correct" : "wrong");
        setFlipped(true);
      }

      function rateCard(rating) {
        setConfidence(prev => ({ ...prev, [card.word]: rating }));
      }

      useEffect(() => {
        function handleKey(e) {
          if (e.key === "ArrowRight") { go("next"); return; }
          if (e.key === "ArrowLeft")  { go("prev"); return; }
          if (mode === "study" && !flipped && (e.key === " " || e.key === "ArrowUp" || e.key === "ArrowDown")) {
            e.preventDefault(); setFlipped(true);
          } else if (mode === "study" && flipped && (e.key === " " || e.key === "ArrowUp" || e.key === "ArrowDown")) {
            e.preventDefault(); setFlipped(false);
          } else if (mode === "recall" && e.key === "Enter" && !flipped && userInput.trim()) {
            e.preventDefault(); checkAnswer();
          } else if (flipped && ["1","2","3","4"].includes(e.key)) {
            rateCard(parseInt(e.key));
          }
        }
        window.addEventListener("keydown", handleKey);
        return () => window.removeEventListener("keydown", handleKey);
      }, [filtered, index, card, mode, flipped, userInput]);

      return (
        <div style={{
          minHeight: "100vh",
          background: "#0d0d0d",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          padding: "24px 16px",
          fontFamily: "'Georgia', 'Times New Roman', serif",
        }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');
            * { box-sizing: border-box; }
            .card-wrap { perspective: 1200px; }
            .card-inner {
              position: relative; width: 100%; height: 100%;
              transform-style: preserve-3d;
              transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .card-inner.flipped { transform: rotateY(180deg); }
            .card-face {
              position: absolute; inset: 0;
              backface-visibility: hidden; -webkit-backface-visibility: hidden;
              border-radius: 20px;
              display: flex; flex-direction: column; align-items: center; justify-content: center;
              padding: 36px 32px;
            }
            .card-back { transform: rotateY(180deg); }
            .slide-left  { animation: slideLeft  0.2s ease forwards; }
            .slide-right { animation: slideRight 0.2s ease forwards; }
            @keyframes slideLeft  { to { opacity: 0; transform: translateX(-30px); } }
            @keyframes slideRight { to { opacity: 0; transform: translateX(30px);  } }
            .nav-btn {
              background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
              color: #fff; width: 48px; height: 48px; border-radius: 50%; font-size: 20px;
              cursor: pointer; transition: background 0.2s, border 0.2s;
              display: flex; align-items: center; justify-content: center;
            }
            .nav-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.28); }
            .cat-btn {
              background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
              color: rgba(255,255,255,0.55); padding: 6px 14px; border-radius: 20px;
              font-size: 11px; letter-spacing: 0.08em; cursor: pointer;
              font-family: 'DM Mono', monospace; transition: all 0.2s; white-space: nowrap;
            }
            .cat-btn.active { color: #fff; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.12); }
            .mode-btn {
              background: transparent; border: 1px solid rgba(255,255,255,0.15);
              color: rgba(255,255,255,0.4); padding: 5px 16px; border-radius: 16px;
              font-size: 11px; letter-spacing: 0.1em; cursor: pointer;
              font-family: 'DM Mono', monospace; transition: all 0.2s; text-transform: uppercase;
            }
            .mode-btn.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.35); color: #fff; }
            .recall-input {
              background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2);
              border-radius: 10px; color: #fff; font-size: 18px;
              font-family: 'Playfair Display', serif; padding: 10px 16px;
              width: 100%; max-width: 300px; text-align: center; outline: none;
              transition: border-color 0.2s;
            }
            .recall-input:focus { border-color: rgba(255,255,255,0.45); }
            .recall-input.correct { border-color: #52b788; color: #52b788; }
            .recall-input.wrong   { border-color: #e94560; }
            .check-btn {
              background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
              color: #fff; padding: 7px 20px; border-radius: 20px; font-size: 12px;
              font-family: 'DM Mono', monospace; letter-spacing: 0.08em;
              cursor: pointer; margin-top: 10px; transition: all 0.2s;
            }
            .check-btn:hover { background: rgba(255,255,255,0.14); }
            .rating-btn {
              border: 1px solid; padding: 8px 14px; border-radius: 14px;
              font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em;
              cursor: pointer; background: transparent; transition: all 0.15s;
              touch-action: manipulation; min-height: 36px;
            }
            .rating-btn:hover { filter: brightness(1.2); }
            /* Mobile sizing tweaks */
            @media (max-width: 430px) {
              .card-face { padding: 24px 20px !important; }
              .nav-btn { width: 44px; height: 44px; }
            }
            @media (hover: none) and (pointer: coarse) {
              .keyboard-hint { display: none; }
              .touch-hint { display: inline; }
            }
            @media (hover: hover) and (pointer: fine) {
              .touch-hint { display: none; }
              .keyboard-hint { display: inline; }
            }
          `}</style>

          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 13, letterSpacing: "0.25em", color: "rgba(255,255,255,0.35)", textTransform: "uppercase", marginBottom: 6 }}>Analysis Vocabulary</div>
            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, fontWeight: 900, color: "#fff", letterSpacing: "-0.01em" }}>Today's Practice</div>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "rgba(255,255,255,0.25)", letterSpacing: "0.1em", marginTop: 6, marginBottom: 14 }}>
              {dailyWords.filter(w => !w.isReview).length} new &nbsp;·&nbsp; {dailyWords.filter(w => w.isReview).length} review
            </div>
            <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
              <button className={`mode-btn${mode === "study"  ? " active" : ""}`} onClick={() => setMode("study")}>Study</button>
              <button className={`mode-btn${mode === "recall" ? " active" : ""}`} onClick={() => setMode("recall")}>Recall</button>
            </div>
          </div>

          {/* Category filter */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", marginBottom: 24, maxWidth: 560 }}>
            {categories.map(cat => (
              <button key={cat} className={`cat-btn${filter === cat ? " active" : ""}`}
                onClick={() => { setFilter(cat); setIndex(0); setFlipped(false); setUserInput(""); setInputResult(null); }}>
                {cat === "All" ? "All" : cat.split(" ")[0]}
              </button>
            ))}
          </div>

          {/* Card */}
          <div className={`card-wrap${direction ? ` slide-${direction === "next" ? "left" : "right"}` : ""}`}
            style={{ width: "min(500px, 100%)", height: 360, touchAction: "pan-y" }}
            onTouchStart={handleTouchStart}
            onTouchEnd={handleTouchEnd}>
            <div className={`card-inner${flipped ? " flipped" : ""}`}>

              {/* ── FRONT ── */}
              <div className="card-face"
                style={{ background: colors.bg, border: `1px solid ${colors.accent}30`, cursor: mode === "study" ? "pointer" : "default" }}
                onClick={mode === "study" ? () => setFlipped(f => !f) : undefined}>

                {/* Category label */}
                <div style={{ position: "absolute", top: 18, left: 22, fontSize: 10, fontFamily: "'DM Mono', monospace", letterSpacing: "0.18em", color: colors.accent, textTransform: "uppercase" }}>{card?.category}</div>

                {/* Badges */}
                <div style={{ position: "absolute", top: 16, right: 18, display: "flex", gap: 6, alignItems: "center" }}>
                  {card?.isReview && <div style={{ fontSize: 9, fontFamily: "'DM Mono', monospace", letterSpacing: "0.15em", color: colors.accent, textTransform: "uppercase", border: `1px solid ${colors.accent}70`, padding: "2px 7px", borderRadius: 10 }}>review</div>}
                  {cardConfidence > 0 && <div style={{ fontSize: 10, fontFamily: "'DM Mono', monospace", color: RATINGS[cardConfidence - 1]?.color, opacity: 0.75 }}>{cardConfidence}/4</div>}
                </div>

                {mode === "study" ? (
                  <>
                    <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 38, fontWeight: 700, color: "#fff", textAlign: "center", lineHeight: 1.1, marginBottom: 8 }}>{card?.word}</div>
                    <div style={{ fontSize: 13, fontFamily: "'DM Mono', monospace", color: colors.accent, opacity: 0.6, letterSpacing: "0.05em", fontStyle: "italic", marginBottom: 20, textAlign: "center" }}>{card?.pronunciation}</div>
                    <div style={{ fontSize: 11, fontFamily: "'DM Mono', monospace", color: "rgba(255,255,255,0.28)", letterSpacing: "0.12em" }}>
                      <span className="touch-hint">tap to flip · swipe to navigate</span>
                      <span className="keyboard-hint">space to flip · ← → to navigate</span>
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 16, color: "rgba(255,255,255,0.82)", textAlign: "center", lineHeight: 1.55, maxWidth: 340, marginBottom: 16, fontStyle: "italic" }}>{card?.definition}</div>
                    <input
                      ref={inputRef}
                      className={`recall-input${inputResult ? ` ${inputResult}` : ""}`}
                      type="text"
                      placeholder="type the word…"
                      value={userInput}
                      onChange={e => setUserInput(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter" && userInput.trim()) { e.preventDefault(); checkAnswer(); } }}
                      disabled={flipped}
                      onClick={e => e.stopPropagation()}
                    />
                    {!flipped && (
                      <button className="check-btn" onClick={e => { e.stopPropagation(); if (userInput.trim()) checkAnswer(); }}>Check →</button>
                    )}
                    <div style={{ fontSize: 10, fontFamily: "'DM Mono', monospace", color: "rgba(255,255,255,0.2)", letterSpacing: "0.1em", marginTop: 10 }}>
                      <span className="touch-hint">tap Check · swipe to navigate</span>
                      <span className="keyboard-hint">enter to check · ← → to navigate</span>
                    </div>
                  </>
                )}
              </div>

              {/* ── BACK ── */}
              <div className="card-face card-back"
                style={{ background: colors.bg, border: `1px solid ${colors.accent}50`, padding: "28px 32px", cursor: mode === "study" ? "pointer" : "default" }}
                onClick={mode === "study" ? () => setFlipped(false) : undefined}>

                {/* Word + result indicator */}
                <div style={{ marginBottom: 2, textAlign: "center" }}>
                  <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, color: "rgba(255,255,255,0.5)", fontStyle: "italic" }}>{card?.word}</span>
                  {inputResult === "correct" && <span style={{ marginLeft: 8, fontSize: 13, color: "#52b788" }}>✓ correct</span>}
                  {inputResult === "wrong"   && <span style={{ marginLeft: 8, fontSize: 11, fontFamily: "'DM Mono', monospace", color: "#e94560" }}>you wrote: {userInput}</span>}
                </div>

                {/* Pronunciation */}
                <div style={{ fontSize: 11, fontFamily: "'DM Mono', monospace", color: colors.accent, opacity: 0.55, letterSpacing: "0.05em", fontStyle: "italic", marginBottom: 10, textAlign: "center" }}>{card?.pronunciation}</div>

                {/* Definition */}
                <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, color: "#fff", textAlign: "center", lineHeight: 1.5, maxWidth: 380, marginBottom: 8 }}>{card?.definition}</div>

                {/* Example */}
                <div style={{ fontSize: 12, fontFamily: "'Playfair Display', serif", fontStyle: "italic", color: "rgba(255,255,255,0.36)", textAlign: "center", lineHeight: 1.55, maxWidth: 380, marginBottom: 14 }}>"{card?.example}"</div>

                {/* 1–4 confidence rating */}
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
                  {RATINGS.map(r => (
                    <button key={r.value} className="rating-btn"
                      style={{ borderColor: r.color, color: cardConfidence === r.value ? "#000" : r.color, background: cardConfidence === r.value ? r.color : "transparent" }}
                      onClick={e => { e.stopPropagation(); rateCard(r.value); }}>
                      {r.value} · {r.label}
                    </button>
                  ))}
                </div>
                <div style={{ fontSize: 10, fontFamily: "'DM Mono', monospace", color: "rgba(255,255,255,0.18)", letterSpacing: "0.1em", marginTop: 8 }}>1–4 keys to rate</div>
              </div>
            </div>
          </div>

          {/* Navigation */}
          <div style={{ display: "flex", alignItems: "center", gap: 24, marginTop: 24 }}>
            <button className="nav-btn" onClick={() => go("prev")}>←</button>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 13, color: "rgba(255,255,255,0.4)", minWidth: 70, textAlign: "center" }}>
              {(index % filtered.length) + 1} / {filtered.length}
            </div>
            <button className="nav-btn" onClick={() => go("next")}>→</button>
          </div>

          {/* Stats */}
          <div style={{ marginTop: 18, fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: "0.12em", color: "rgba(255,255,255,0.25)", textAlign: "center" }}>
            {masteredCount} mastered (≥3) &nbsp;·&nbsp; {words.length} in bank
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Flashcards />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
